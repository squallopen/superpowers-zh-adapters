<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Superpowers 首页工作流总览</title>
  <desc id="desc">从 using-superpowers 选工作流，再根据需求分析、计划、调试、测试、评审、验证和分支收尾进入对应 skill 的静态流程图。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f4ea"/>
      <stop offset="55%" stop-color="#eef8f6"/>
      <stop offset="100%" stop-color="#e9f1fb"/>
    </linearGradient>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="1.6" fill="#86a3ad" opacity="0.14"/>
      <circle cx="24" cy="16" r="1.6" fill="#86a3ad" opacity="0.1"/>
      <circle cx="10" cy="26" r="1.3" fill="#86a3ad" opacity="0.08"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#12384a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L14,7 L0,14 z" fill="#335c73"/>
    </marker>
    <style>
      .bg-grid { fill: url(#dots); }
      .connector { fill: none; stroke: #335c73; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); opacity: 0.9; }
      .connector-soft { fill: none; stroke: #567a8d; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); opacity: 0.55; stroke-dasharray: 10 12; }
      .card { filter: url(#shadow); }
      .card rect { stroke-width: 3; }
      .title { font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 28px; font-weight: 700; fill: #163247; }
      .title-sm { font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 26px; font-weight: 700; fill: #163247; }
      .skill { font-family: "JetBrains Mono", "Consolas", monospace; font-size: 17px; font-weight: 600; fill: #4f6a7f; }
      .skill-sm { font-family: "JetBrains Mono", "Consolas", monospace; font-size: 16px; font-weight: 600; fill: #4f6a7f; }
      .diamond-title { font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 31px; font-weight: 800; fill: #5d3700; }
      .pill-text { font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 18px; font-weight: 700; fill: #3e5c69; }
      .footer { font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 18px; font-weight: 600; fill: #57717b; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <rect width="1600" height="980" class="bg-grid"/>
  <circle cx="140" cy="110" r="190" fill="#fff7da" opacity="0.5"/>
  <circle cx="1460" cy="140" r="220" fill="#dff4ef" opacity="0.46"/>
  <circle cx="1350" cy="840" r="260" fill="#e3eefb" opacity="0.58"/>
  <circle cx="260" cy="860" r="220" fill="#f9ebdf" opacity="0.42"/>

  <path class="connector" d="M320 176 C345 176 355 176 380 176"/>
  <path class="connector" d="M700 176 C770 176 784 214 720 285"/>
  <path class="connector" d="M742 258 C620 250 490 300 380 440"/>
  <path class="connector" d="M748 326 C610 372 430 468 356 670"/>
  <path class="connector" d="M820 395 C760 510 706 620 670 760"/>
  <path class="connector" d="M902 394 C970 502 1040 598 1112 705"/>
  <path class="connector" d="M956 252 C1068 210 1140 185 1170 182"/>
  <path class="connector" d="M1340 240 C1344 260 1345 285 1345 315"/>
  <path class="connector-soft" d="M1345 435 C1345 468 1342 490 1340 515"/>
  <path class="connector" d="M982 314 C1080 372 1150 452 1170 575"/>
  <path class="connector" d="M1340 635 C1342 660 1344 690 1348 720"/>

  <g class="card" transform="translate(70 120)">
    <rect width="250" height="112" rx="28" fill="#fff5cf" stroke="#d4a23a"/>
    <text class="title-sm" x="26" y="49">不知道先用哪个 skill</text>
    <text class="skill" x="26" y="82">从入口先判断当前阶段</text>
  </g>

  <g class="card" transform="translate(380 112)">
    <rect width="320" height="126" rx="30" fill="#ddf5ef" stroke="#2e8c80"/>
    <text class="title" x="34" y="55">先选工作流</text>
    <text class="skill" x="34" y="92">using-superpowers</text>
  </g>

  <g filter="url(#shadow)">
    <polygon points="850,160 980,285 850,410 720,285" fill="#ffe6a2" stroke="#c88920" stroke-width="4"/>
    <text class="diamond-title" x="850" y="278" text-anchor="middle">当前最需要什么？</text>
    <text class="skill-sm" x="850" y="314" text-anchor="middle">按场景切到对应 workflow</text>
  </g>

  <g class="card" transform="translate(65 465)">
    <rect width="360" height="126" rx="30" fill="#e6f3ff" stroke="#4c8ec3"/>
    <text class="title" x="28" y="52">需求分析 / 总体设计</text>
    <text class="title" x="28" y="84">详细设计</text>
    <text class="skill" x="28" y="108">brainstorming</text>
  </g>

  <g class="card" transform="translate(1180 120)">
    <rect width="330" height="120" rx="30" fill="#ffe7d8" stroke="#de7a3f"/>
    <text class="title" x="28" y="56">实施计划 / 任务拆解</text>
    <text class="skill" x="28" y="92">writing-plans</text>
  </g>

  <g class="card" transform="translate(1185 315)">
    <rect width="320" height="120" rx="30" fill="#e7eef7" stroke="#4d6583"/>
    <text class="title" x="28" y="56">按计划推进实现</text>
    <text class="skill-sm" x="28" y="92">executing-plans / subagent-driven-development</text>
  </g>

  <g class="card" transform="translate(80 670)">
    <rect width="320" height="120" rx="30" fill="#ffe4df" stroke="#cc6355"/>
    <text class="title" x="28" y="56">系统排查问题</text>
    <text class="skill" x="28" y="92">systematic-debugging</text>
  </g>

  <g class="card" transform="translate(510 760)">
    <rect width="320" height="120" rx="30" fill="#e3f5df" stroke="#58915a"/>
    <text class="title" x="28" y="56">测试先行</text>
    <text class="skill" x="28" y="92">test-driven-development</text>
  </g>

  <g class="card" transform="translate(910 705)">
    <rect width="410" height="128" rx="30" fill="#fff0d9" stroke="#ca8a37"/>
    <text class="title" x="28" y="54">代码评审 / 修改决策</text>
    <text class="skill-sm" x="28" y="92">requesting-code-review / receiving-code-review</text>
  </g>

  <g class="card" transform="translate(1170 515)">
    <rect width="340" height="120" rx="30" fill="#ddf2f7" stroke="#3d89a0"/>
    <text class="title" x="28" y="56">收尾前验证</text>
    <text class="skill" x="28" y="92">verification-before-completion</text>
  </g>

  <g class="card" transform="translate(1185 720)">
    <rect width="330" height="120" rx="30" fill="#eff1ff" stroke="#6671c1"/>
    <text class="title" x="28" y="56">开发分支收尾</text>
    <text class="skill" x="28" y="92">finishing-a-development-branch</text>
  </g>

  <g transform="translate(472 395)" filter="url(#shadow)">
    <rect width="178" height="44" rx="22" fill="#ffffff" stroke="#8aa5b0" stroke-width="2"/>
    <text class="pill-text" x="89" y="28" text-anchor="middle">需求还不清楚</text>
  </g>

  <g transform="translate(1032 140)" filter="url(#shadow)">
    <rect width="206" height="44" rx="22" fill="#ffffff" stroke="#8aa5b0" stroke-width="2"/>
    <text class="pill-text" x="103" y="28" text-anchor="middle">方案已定，要拆步骤</text>
  </g>

  <g transform="translate(438 560)" filter="url(#shadow)">
    <rect width="164" height="44" rx="22" fill="#ffffff" stroke="#8aa5b0" stroke-width="2"/>
    <text class="pill-text" x="82" y="28" text-anchor="middle">问题反复出现</text>
  </g>

  <g transform="translate(618 648)" filter="url(#shadow)">
    <rect width="136" height="44" rx="22" fill="#ffffff" stroke="#8aa5b0" stroke-width="2"/>
    <text class="pill-text" x="68" y="28" text-anchor="middle">想测试先行</text>
  </g>

  <g transform="translate(944 626)" filter="url(#shadow)">
    <rect width="154" height="44" rx="22" fill="#ffffff" stroke="#8aa5b0" stroke-width="2"/>
    <text class="pill-text" x="77" y="28" text-anchor="middle">想先做评审</text>
  </g>

  <g transform="translate(1094 432)" filter="url(#shadow)">
    <rect width="172" height="44" rx="22" fill="#ffffff" stroke="#8aa5b0" stroke-width="2"/>
    <text class="pill-text" x="86" y="28" text-anchor="middle">准备宣布做完</text>
  </g>

  <text class="footer" x="70" y="932">首页使用静态 SVG，方便控制样式；其余说明文档仍保留 Mermaid 源码，后续可继续改。</text>
</svg>
